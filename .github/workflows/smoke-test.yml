name: JMeter API Smoke Test

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 0 * * 1-5'

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Apache JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Verify JMeter Installation
        run: |
          ./apache-jmeter-5.6.3/bin/jmeter -v

      - name: Run Smoke Test
        run: |
          mkdir -p results
          rm -rf reports

          ./apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t jmeter/Smoke-API.jmx \
            -l results/results.jtl \
            -j results/jmeter.log \
            -e \
            -o reports

      - name: Show Generated Files
        if: always()
        run: |
          echo "===== RESULTS ====="
          ls -R results || true

          echo ""
          echo "===== REPORTS ====="
          ls -R reports || true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JMeter-HTML-Report
          path: reports/

      - name: Upload JTL Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JMeter-Results
          path: results/results.jtl

      - name: Upload JMeter Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JMeter-Log
          path: results/jmeter.log

      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "# 🚀 API Smoke Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | ${{ github.repository }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Java | 17 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| JMeter | 5.6.3 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HTML Report | Uploaded as Artifact |" >> "$GITHUB_STEP_SUMMARY"
          echo "| JTL Results | Uploaded as Artifact |" >> "$GITHUB_STEP_SUMMARY"
          echo "| JMeter Log | Uploaded as Artifact |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          STATUS="✅ PASSED"

          if [ "${{ job.status }}" != "success" ]; then
            STATUS="❌ FAILED"
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"content\": \"🚀 **JMeter API Smoke Test**\n\nStatus: $STATUS\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nTrigger: ${{ github.event_name }}\nArtifacts:\n• HTML Report\n• JTL Results\n• JMeter Log\"
            }" \
            "$WEBHOOK"

      - name: Email Smoke Test Reports
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: |
            🚀 JMeter API Smoke Test - ${{ job.status }}

          to: ${{ secrets.MAIL_TO }}

          from: GitHub Actions

          body: |
            Hello Team,

            The scheduled JMeter API Smoke Test has completed.

            ==========================================
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Trigger    : ${{ github.event_name }}
            Status     : ${{ job.status }}
            Run Number : ${{ github.run_number }}
            ==========================================

            Workflow URL:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Attached Files:
            • HTML Report (.zip)
            • JMeter Results (.jtl)
            • JMeter Log

            Regards,
            GitHub Actions

          attachments: |
            JMeter-HTML-Report.zip
            results/results.jtl
            results/jmeter.log