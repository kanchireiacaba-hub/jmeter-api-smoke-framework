name: JMeter API Smoke Test

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 0 * * 1-5'

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Apache JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Verify JMeter Installation
        run: |
          ./apache-jmeter-5.6.3/bin/jmeter -v

      - name: Run Smoke Test
        run: |
          mkdir -p results
          rm -rf reports

          ./apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t jmeter/Smoke-API.jmx \
            -l results/results.jtl \
            -j results/jmeter.log \
            -e \
            -o reports
      - name: Determine Test Result
        if: always()
        run: |
          TOTAL=$(grep -cv '^timeStamp' results/results.jtl || true)

          FAILED=$(grep -c 'success=false' results/results.jtl || true)

          PASSED=$((TOTAL-FAILED))

          PASSRATE=0

          if [ "$TOTAL" -gt 0 ]; then
            PASSRATE=$((PASSED*100/TOTAL))
          fi

          if [ "$FAILED" -eq 0 ] && [ "$PASSRATE" -eq 100 ]; then
            STATUS="✅ PASSED"
          else
            STATUS="❌ FAILED"
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSRATE=$PASSRATE" >> $GITHUB_ENV

      - name: Show Generated Files
        if: always()
        run: |
          echo "===== RESULTS ====="
          ls -R results || true

          echo ""
          echo "===== REPORTS ====="
          ls -R reports || true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JMeter-HTML-Report
          path: reports/

      - name: Upload JTL Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JMeter-Results
          path: results/results.jtl

      - name: Upload JMeter Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JMeter-Log
          path: results/jmeter.log

      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "# 🚀 API Smoke Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | ${{ github.repository }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Java | 17 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| JMeter | 5.6.3 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HTML Report | Uploaded as Artifact |" >> "$GITHUB_STEP_SUMMARY"
          echo "| JTL Results | Uploaded as Artifact |" >> "$GITHUB_STEP_SUMMARY"
          echo "| JMeter Log | Uploaded as Artifact |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"🚀 **JMeter API Smoke Test**

          Status : ${{ env.STATUS }}

          📊 Summary
          • Total : ${{ env.TOTAL }}
          • Passed : ${{ env.PASSED }}
          • Failed : ${{ env.FAILED }}
          • Pass Rate : ${{ env.PASSRATE }}%

          Repository : ${{ github.repository }}
          Branch : ${{ github.ref_name }}

          Workflow:
          $RUN_URL\"
                    }" \
                    "$WEBHOOK"

      - name: Email Smoke Test Reports
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: |
            🚀 JMeter API Smoke Test - ${{ env.STATUS }}

          to: ${{ secrets.MAIL_TO }}

          from: GitHub Actions

          body: |
            Hello Team,

            The scheduled JMeter API Smoke Test has completed.

            ==========================================
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Trigger    : ${{ github.event_name }}
            Status : ${{ env.STATUS }}
            Total Tests : ${{ env.TOTAL }}
            Passed      : ${{ env.PASSED }}
            Failed      : ${{ env.FAILED }}
            Pass Rate   : ${{ env.PASSRATE }}%
            Run Number : ${{ github.run_number }}
            ==========================================

            Workflow URL:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Attached Files:
            • HTML Report (.zip)
            • JMeter Results (.jtl)
            • JMeter Log

            Regards,
            GitHub Actions

          attachments: |
            JMeter-HTML-Report.zip
            results/results.jtl
            results/jmeter.log

      - name: Fail Pipeline if Tests Failed
            if: always()
            run: |
              if [ "${{ env.FAILED }}" -gt 0 ]; then
                echo "Smoke Test Failed."
                exit 1
              fi