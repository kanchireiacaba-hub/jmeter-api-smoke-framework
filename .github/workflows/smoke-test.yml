name: JMeter API Smoke Test

'on':
  push:
    branches:
      - main

workflow_dispatch:

schedule:
# Monday-Friday 8:00 AM Philippine Time (00:00 UTC)
- cron: '0 0 * * 1-5'

jobs:
smoke-test:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set up Java 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Download Apache JMeter
    run: |
      wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
      tar -xzf apache-jmeter-5.6.3.tgz

  - name: Verify JMeter Installation
    run: |
      ./apache-jmeter-5.6.3/bin/jmeter -v

  - name: Run API Smoke Test
    run: |
      mkdir -p results
      rm -rf reports
      mkdir -p reports

      ./apache-jmeter-5.6.3/bin/jmeter \
        -n \
        -t jmeter/Smoke-API.jmx \
        -l results/results.jtl \
        -e \
        -o reports

  - name: Upload HTML Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: JMeter-HTML-Report
      path: reports/

  - name: Upload JTL Results
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: JMeter-Results
      path: results/results.jtl

  - name: Generate Workflow Summary
    if: always()
    run: |
      {
        echo "# 🚀 API Smoke Test Summary"
        echo ""
        echo "| Item | Value |"
        echo "|------|-------|"
        echo "| Repository | ${{ github.repository }} |"
        echo "| Branch | ${{ github.ref_name }} |"
        echo "| Trigger | ${{ github.event_name }} |"
        echo "| Java Version | 17 |"
        echo "| Apache JMeter | 5.6.3 |"
        echo "| Schedule | Monday-Friday 8:00 AM (PHT) |"
        echo "| HTML Report | Uploaded as Artifact |"
        echo "| JTL Results | Uploaded as Artifact |"
      } >> "$GITHUB_STEP_SUMMARY"
```
